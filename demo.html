<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实训报告智能批改系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 32px; }
        .main-card { background: white; border-radius: 20px; overflow: hidden; }
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 18px; text-align: center; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab.active { color: #667eea; border-bottom: 3px solid #667eea; }
        .tab-content { padding: 30px; }
        .upload-section { text-align: center; padding: 40px; }
        .upload-box { border: 3px dashed #ddd; border-radius: 15px; padding: 40px; cursor: pointer; }
        .upload-box:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-icon { font-size: 60px; margin-bottom: 20px; }
        .upload-text { font-size: 18px; color: #7f8c8d; }
        .file-input { display: none; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn.primary { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; }
        .btn:disabled { opacity: 0.5; }
        .score-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 20px; text-align: center; }
        .score-value { font-size: 56px; font-weight: bold; }
        .hidden { display: none; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📝 实训报告智能批改系统</h1></div>
        <div class="main-card">
            <div class="tabs">
                <div class="tab active" onclick="showTab('upload')">📁 上传文件</div>
                <div class="tab" onclick="showTab('result')">📊 批改结果</div>
            </div>
            <div class="tab-content" id="upload-tab">
                <div class="upload-section">
                    <div class="upload-box" onclick="document.getElementById('ref-file').click()">
                        <div class="upload-icon">📋</div>
                        <div class="upload-text">上传参考答案报告</div>
                        <input type="file" id="ref-file" class="file-input">
                    </div>
                </div>
                <div class="upload-section">
                    <div class="upload-box" onclick="document.getElementById('stu-file').click()">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">上传学生实训报告</div>
                        <input type="file" id="stu-file" class="file-input" multiple>
                    </div>
                </div>
                <button class="btn primary" id="start-btn" disabled onclick="startGrading()">🚀 开始批改</button>
            </div>
            <div class="tab-content hidden" id="result-tab">
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div id="result-content">等待批改...</div>
            </div>
        </div>
    </div>
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tab + '-tab').classList.remove('hidden');
            event.target.classList.add('active');
        }
        function startGrading() {
            const progress = document.getElementById('progress-fill');
            let p = 0;
            const timer = setInterval(() => {
                p += 10;
                progress.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(timer);
                    showResult();
                }
            }, 100);
        }
        function showResult() {
            const result = document.getElementById('result-content');
            result.innerHTML = '<div class="score-card"><div class="score-value">85</div><div>总分 / 100</div></div>';
        }
        document.getElementById('ref-file').addEventListener('change', () => checkFiles());
        document.getElementById('stu-file').addEventListener('change', () => checkFiles());
        function checkFiles() {
            const ref = document.getElementById('ref-file').files.length;
            const stu = document.getElementById('stu-file').files.length;
            document.getElementById('start-btn').disabled = !(ref && stu);
        }
    </script>
</body>
</html>
